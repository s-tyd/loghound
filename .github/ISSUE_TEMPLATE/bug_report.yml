name: Bug report
description: Report a reproducible loghound issue
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not paste credentials, tokens, or full private log files. Prefer small redacted snippets.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: Commands or code needed to reproduce the issue.
      placeholder: |
        1. Run `loghound stay ...`
        2. Send ...
        3. Run ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: loghound version
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: Dart SDK, OS, Flutter target, simulator/device
